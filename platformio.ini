; PlatformIO Project Configuration File
[env:mhetesp32devkit]
platform = espressif32
board = mhetesp32devkit
framework = arduino
monitor_speed = 9600
upload_speed = 921600
lib_deps = 
    adafruit/Adafruit MPU6050@^2.2.9
    adafruit/Adafruit Unified Sensor
    adafruit/DHT sensor library@^1.4.7